  var f=getF();
  var tk=f.reduce(function(s,d){return s+d.k},0);
  var tc=f.reduce(function(s,d){return s+d.c},0);
  var days=f.length*60;
  document.getElementById('tk').textContent=tk.toLocaleString()+' 度';
  document.getElementById('tc').textContent='$'+tc.toLocaleString();
  document.getElementById('da').textContent=Math.round(tk/days*10)/10+' 度/日';
  document.getElementById('ap').textContent='$ '+(tc/tk).toFixed(2)+'/度';
  
  if(sid=='all'){
    document.getElementById('mi1').textContent='全部電號';
    document.getElementById('mi2').textContent='住宅/營業混用';
    document.getElementById('mi3').textContent='水林鄉多處';
    document.getElementById('mi4').textContent='XG31 / XR22';
  }else{
    var m=M[sid];
    if(m){
      document.getElementById('mi1').textContent=sid;
      document.getElementById('mi2').textContent=m.t;
      document.getElementById('mi3').textContent=m.a;
      document.getElementById('mi4').textContent=m.f;
    }
  }
  
  // 指定期別各電號模式
  if(s2=='p'){
    var periodData=D.filter(function(d){return d.p===s3});
    var totalK=periodData.reduce(function(s,d){return s+d.k},0);
    var totalC=periodData.reduce(function(s,d){return s+d.c},0);
    document.getElementById('tk').textContent=totalK.toLocaleString()+' 度';
    document.getElementById('tc').textContent='$'+totalC.toLocaleString();
    document.getElementById('da').textContent=Math.round(totalK/60*10)/10+' 度/日';
    document.getElementById('ap').textContent='$ '+(totalC/totalK).toFixed(2)+'/度';
    document.getElementById('meterTitle').textContent='📋 '+P[parseInt(s3)]+' 各電號用電';
    
    periodData.sort(function(a,b){return b.k-a.k});
    var avgK=totalK/periodData.length;
    document.getElementById('meterTh').innerHTML='<tr><th>電號</th><th>用電(度)</th><th>電費(元)</th><th>單價</th><th>佔比</th></tr>';
    document.getElementById('meterTb').innerHTML=periodData.map(function(d){
      var p=(d.c/d.k).toFixed(2);
      var pct=(d.k/totalK*100).toFixed(1);
      var bk=d.k>avgK*1.3?'h':d.k<avgK*0.7?'l':'n';
      var bg=bk=='h'?'高':bk=='l'?'低':'正常';
      var name=M[d.a]?M[d.a].a.split('】')[1]||M[d.a].a:d.a;
      return'<tr><td>'+name+'</td><td>'+d.k.toLocaleString()+'</td><td>$'+d.c.toLocaleString()+'</td><td>$'+p+'</td><td><span class="b '+bk+'">'+pct+'%</span></td></tr>';
    }).join('');
    
    // 繪製指定期別各電號的柱狀圖
    periodData.sort(function(a,b){return b.k-a.k});
    var pmk=Math.max.apply(null,periodData.map(function(d){return d.k}));
    var pmc=Math.max.apply(null,periodData.map(function(d){return d.c}));
    var pn=periodData.length;
    var pmw=460;
    var pmh=175;
    var pmm={t:25,r:20,b:50,l:20};
    
    function pbarSVG(data,max,val){
      var svg='<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">';
      for(var i=0;i<=4;i++){
        var yh=pmm.t+(pmh-20)*(1-i/4);
        svg+='<line x1="'+pmm.l+'" y1="'+yh+'" x2="'+(pmw+pmm.l)+'" y2="'+yh+'" stroke="#eee" stroke-dasharray="3"/>';
      }
      var bw=Math.min(55,(pmw-20*(pn-1))/pn);
      var gap=(pmw-bw*pn)/(pn-1);
      data.forEach(function(d,i){
        var bx=pmm.l+i*(bw+gap);
        var bh=Math.max(4,(d[val]/max)*(pmh-20));
        var by=pmm.t+pmh-20-bh;
        var col=d[val]>max*0.8?'#FF5722':d[val]<max*0.4?'#42A5F5':'#66BB6A';
        var name=M[d.a]?M[d.a].a.split('】')[1]||M[d.a].a:d.a;
        svg+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+col+'" rx="3"/>';
        svg+='<text x="'+(bx+bw/2)+'" y="'+(by-4)+'" class="fv">'+d[val].toLocaleString()+'</text>';
        svg+='<text x="'+(bx+bw/2)+'" y="'+(pmm.t+pmh+12)+'" class="ft" text-anchor="middle">'+(name.length>6?name.substr(0,6):name)+'</text>';
      });
      svg+='</svg>';
      return svg;
    }
    
    document.getElementById('ck').innerHTML=pbarSVG(periodData,pmk,'k');
    document.getElementById('cc').innerHTML=pbarSVG(periodData,pmc,'c');
    return;
  }
  
  var maxK=Math.max.apply(null,f.map(function(d){return d.k}));
  var maxC=Math.max.apply(null,f.map(function(d){return d.c}));
  var n=f.length;
  var margin={t:25,r:20,b:50,l:20};
  var w=460;
  var h=175;
  
  function barSVG(arry,max,val){
    var svg='<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">';
    for(var i=0;i<=4;i++){
      var yh=margin.t+(h-20)*(1-i/4);
      svg+='<line x1="'+margin.l+'" y1="'+yh+'" x2="'+(w+margin.l)+'" y2="'+yh+'" stroke="#eee" stroke-dasharray="3"/>';
    }
    var bw=Math.min(55,(w-20*(n-1))/n);
    var gap=(w-bw*n)/(n-1);
    f.forEach(function(d,i){
      var bx=margin.l+i*(bw+gap);
      var bh=Math.max(4,(d[val]/max)*(h-20));
      var by=margin.t+h-20-bh;
      var col=d[val]>max*0.8?'#FF5722':d[val]<max*0.4?'#42A5F5':'#66BB6A';
      svg+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+col+'" rx="3"/>';
      svg+='<text x="'+(bx+bw/2)+'" y="'+(by-4)+'" class="fv">'+d[val].toLocaleString()+'</text>';
      svg+='<text x="'+(bx+bw/2)+'" y="'+(margin.t+h+12)+'" class="ft" text-anchor="middle">'+d.l+'</text>';
    });
    svg+='</svg>';
    return svg;
  }
  
  document.getElementById('ck').innerHTML=barSVG(f,maxK,'k');
  document.getElementById('cc').innerHTML=barSVG(f,maxC,'c');
  
  var avgK=f.reduce(function(s,d){return s+d.k},0)/f.length;
  document.getElementById('th').innerHTML='<tr><th>期間</th><th>用電(度)</th><th>電費(元)</th><th>單價</th><th>比較</th></tr>';
  document.getElementById('tb').innerHTML=f.map(function(d){
    var p=(d.c/d.k).toFixed(2);
    var bk,bg;
    if(d.k>avgK*1.1){bk='h';bg='高'}
    else if(d.k<avgK*0.9){bk='l';bg='低'}
    else{bk='n';bg='正常'}
    return'<tr><td>'+d.l+'</td><td>'+d.k.toLocaleString()+'</td><td>$'+d.c.toLocaleString()+'</td><td>$'+p+'</td><td><span class="b '+bk+'">'+bg+'</span></td></tr>';
  }).join('');
}

render();
</script>
</body>
</html>
